name: build-downloads

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - website/downloads/**

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos
          - os: ubuntu-latest
            label: linux
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-build.txt

      - name: Build release artifact
        run: python scripts/build_release.py --output-dir release_assets

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: noryven-${{ matrix.label }}
          path: release_assets/*

  publish-downloads:
    if: github.actor != 'github-actions[bot]'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded_artifacts
          merge-multiple: true
          pattern: noryven-*

      - name: Publish downloads to latest GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view downloads-latest >/dev/null 2>&1 || gh release create downloads-latest --title "Noryven downloads" --notes "Latest desktop artifacts for Noryven."
          for asset in noryven-windows.exe noryven-macos.zip noryven-linux.tar.gz; do
            gh release delete-asset downloads-latest "$asset" --yes >/dev/null 2>&1 || true
          done
          gh release upload downloads-latest downloaded_artifacts/* --clobber

      - name: Update website download manifest
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          from __future__ import annotations
          import hashlib
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          root = Path(".").resolve()
          downloads_dir = root / "website" / "downloads"
          downloads_dir.mkdir(parents=True, exist_ok=True)
          artifacts_dir = root / "downloaded_artifacts"

          expected = {
              "windows": "noryven-windows.exe",
              "macos": "noryven-macos.zip",
              "linux": "noryven-linux.tar.gz",
          }
          release_base_url = f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/releases/download/downloads-latest"

          for filename in expected.values():
              (downloads_dir / filename).unlink(missing_ok=True)

          manifest_path = downloads_dir / "manifest.json"
          manifest = {
              "generated_at": datetime.now(timezone.utc).isoformat(),
          }
          for key, filename in expected.items():
              target = artifacts_dir / filename
              available = target.exists()
              size_bytes = target.stat().st_size if available else 0
              sha256 = hashlib.sha256(target.read_bytes()).hexdigest() if available else ""
              manifest[key] = {
                  "available": available,
                  "filename": filename,
                  "url": f"{release_base_url}/{filename}" if available else "",
                  "sha256": sha256,
                  "size_bytes": size_bytes,
              }

          manifest_path.write_text(json.dumps(manifest, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Commit published downloads
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add website/downloads
          if git diff --cached --quiet; then
            echo "No published download changes."
            exit 0
          fi
          git commit -m "chore: publish website downloads"
          git push
